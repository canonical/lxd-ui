name: Test coverage
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e-coverage:
    name: e2e-test-coverage
    runs-on: ubuntu-latest
    env:
      LXD_OIDC_CLIENT_ID: "RYDnMpkygLAMfeo17lU7LYwWGxisRuRR"
      LXD_OIDC_CLIENT_SECRET: "CNKX4UmrZKZJq5rJy5VM_JfcNPqkws1rwWWQk_q0oyZ8gABARr19ic7xrhPssGA1"
      LXD_OIDC_ISSUER: "https://dev-h6c02msuggpi6ijh.eu.auth0.com/"
      LXD_OIDC_AUDIENCE: "https://dev-h6c02msuggpi6ijh.eu.auth0.com/api/v2/"
      LXD_OIDC_USER: "lxd-ui-e2e-tests@example.org"
      LXD_OIDC_PASSWORD: "lxd-ui-e2e-password"
      LXD_OIDC_GROUPS_CLAIM: "lxd-idp-groups"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Dotrun
        run: |
          sudo pip3 install dotrun

      - name: Install LXD-UI dependencies
        run: |
          set -x
          sudo chmod 0777 ../lxd-ui
          dotrun install

      - name: OVN dependencies
        run: |
          sudo snap refresh snapd --channel latest/beta || sudo snap install snapd --channel latest/beta
          sudo snap refresh core26 --channel latest/edge || sudo snap install core26 --channel latest/edge

      - name: Run LXD-UI
        env:
          ENVIRONMENT: devel
          PORT: 8407
          LXD_UI_BACKEND_IP: 172.17.0.1
          VITE_PORT: 3000
        run: |
          dotrun &
          curl --head --fail --retry-delay 2 --retry 100 --retry-connrefused --insecure https://localhost:8407

      - name: Setup Ceph
        uses: canonical/lxd/.github/actions/setup-microceph@568e78a6463906d524216353d609941f8eb4d154

      - name: Setup OVN
        uses: canonical/lxd/.github/actions/setup-microovn@568e78a6463906d524216353d609941f8eb4d154

      - name: Install LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1
        with:
          bridges: "lxdbr0,workshopbr0"
          channel: "latest/edge"

      - name: Setup LXD
        shell: bash
        run: |
          set -x
          sudo lxc config set core.https_address "[::]:8443"
          sudo lxc config trust add keys/lxd-ui.crt
          sudo lxc config set cluster.https_address "127.0.0.1"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: Setup for tests
        shell: bash
        run: ./tests/scripts/setup_test

      - name: Run tests with coverage
        shell: bash
        run: |
          set -x
          sudo chmod -R 0777 ../lxd-ui
          yarn test-js-coverage
          yarn test-e2e-cleanup
          yarn test-e2e-coverage

          # stop dotrun
          DOTRUN_CONTAINER_ID=$(docker ps | awk '{print $1}' | tail -n1)
          docker stop $DOTRUN_CONTAINER_ID

          # configure two node cluster as cluster test backend
          tests/scripts/start_vm_cluster.sh latest/edge

          # start dotrun with VM1 lxd backend
          dotrun &
          curl --head --fail --retry-delay 2 --retry 100 --retry-connrefused --insecure https://localhost:8407

          yarn test-e2e-cluster-coverage

          # combine coverage reports
          yarn test-report-coverage
          zip -r coverage/playwright-report/cobertura-coverage.zip coverage/playwright-report/cobertura-coverage.xml
          DOTRUN_CONTAINER_ID=$(docker ps | awk '{print $1}' | tail -n1)
          docker stop $DOTRUN_CONTAINER_ID

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-artifacts
          path: test-results
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lxd-coverage
          path: coverage/playwright-report
          retention-days: 1

  publish-coverage-report:
    name: publish-coverage-report
    runs-on: ubuntu-latest
    needs: e2e-coverage
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true # zizmor: ignore[artipacked]
      - name: Cleanup coverage directory
        run: |
          rm -rf coverage
          mkdir coverage
      - name: Download coverage report artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lxd-coverage
          path: coverage
      # user git configs are needed for git commands to work
      # actual authentication is done using secrets.GITHUB_TOKEN with write permission
      - name: Set Git User
        run: |
          git config --global user.email "github-action@example.com"
          git config --global user.name "GitHub Action"
      - name: Push coverage Report
        timeout-minutes: 3
        run: |
          git add .
          git commit -m "workflow: update coverage report"

          # In case of another action job pushing to gh-pages while we are rebasing for the current job
          while true; do
            git pull --rebase
            if [ $? -ne 0 ]; then
              echo "Failed to rebase. Please review manually."
              exit 1
            fi

            git push
            if [ $? -eq 0 ]; then
              echo "Successfully pushed HTML report to repo."
              exit 0
            fi
          done
      - name: Output Report URL as Workflow Annotation
        run: |
          FULL_HTML_REPORT_URL=https://canonical.github.io/lxd-ui/coverage
          echo "::notice title=Published Coverage Report::$FULL_HTML_REPORT_URL"

  tics-report:
    runs-on: [self-hosted, linux, amd64, resolute]
    needs: publish-coverage-report
    # Self-hosted runners share machine-level resources. Serialize TICS
    # to avoid qserver collisions for the same project database.
    concurrency:
      group: tics-report-${{ github.repository }}
      cancel-in-progress: false
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install LXD-UI dependencies
        run: |
          set -x
          yarn install

      - name: Produce TICS report
        uses: tiobe/tics-github-action@a53037a6bb9f71b6a97cdeb0ac41632266804b9e # v3.8.0
        with:
          mode: qserver
          project: lxd-ui
          viewerUrl: https://canonical.tiobe.com/tiobeweb/TICS/api/cfg?name=default
          ticsAuthToken: ${{ secrets.TICSAUTHTOKEN }}
          installTics: true
          # Keep qserver temp state isolated per run. This prevents stale lock/state
          # reuse between different workflow runs on the same self-hosted machine.
          tmpdir: /tmp/tics-${{ github.run_id }}-${{ github.run_attempt }}

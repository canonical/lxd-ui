name: PR checks
on: pull_request

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commits:
    permissions:
      pull-requests: read # to get list of commits from the PR
    name: Signed-off-by (DCO)
    runs-on: ubuntu-latest
    steps:
      - name: Get PR Commits
        id: "get-pr-commits"
        uses: tim-actions/get-pr-commits@198af03565609bb4ed924d1260247b4881f09e7d # v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check that all commits are signed-off
        uses: tim-actions/dco@f2279e6e62d5a7d9115b0cb8e837b777b1b02e21 # v1.1.0
        with:
          commits: ${{ steps.get-pr-commits.outputs.commits }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint scss
        run: yarn lint-scss

      - name: Lint JS
        run: yarn lint-js

      - name: Check circular dependencies
        run: yarn check-circular-deps

  check-inclusive-naming:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check inclusive naming
        uses: canonical/Inclusive-naming@7aa0f7a606f182bd03a7adb28e0d710216101ca5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail-on-error: true

  check-unicode-characters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Find disallowed Unicode characters (excluding .git and binary files)
        run: |
          echo "Scanning for disallowed Unicode characters..."
          # Match non-ASCII characters except — ü and →
          NON_ASCII_FILES=$(grep --color=always -P -n "[^\x00-\x7F—ü→\x{2713}\x{2717}]" -r . \
            --exclude-dir=.git \
            --exclude=*.png \
            --exclude=*.woff2 \
            --exclude=*.tar.gz || true)

          if [ -n "$NON_ASCII_FILES" ]; then
            echo "Disallowed Unicode characters found:"
            echo "$NON_ASCII_FILES"
            exit 1
          else
            echo "No disallowed Unicode characters found."
          fi

  browser-e2e-test:
    name: e2e-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lxd_channel: ["5.0/edge", "5.21/edge", "latest/edge"]
        browser: ["chromium", "firefox"]
        deployment: ["unclustered", "clustered", "single-node-cluster"]
        exclude:
          - lxd_channel: "5.0/edge"
            deployment: "clustered"
          - lxd_channel: "5.0/edge"
            deployment: "single-node-cluster"
    outputs:
      job_status: ${{job.status}}
    env:
      LXD_OIDC_CLIENT_ID: "RYDnMpkygLAMfeo17lU7LYwWGxisRuRR"
      LXD_OIDC_CLIENT_SECRET: "CNKX4UmrZKZJq5rJy5VM_JfcNPqkws1rwWWQk_q0oyZ8gABARr19ic7xrhPssGA1"
      LXD_OIDC_ISSUER: "https://dev-h6c02msuggpi6ijh.eu.auth0.com/"
      LXD_OIDC_AUDIENCE: "https://dev-h6c02msuggpi6ijh.eu.auth0.com/api/v2/"
      LXD_OIDC_USER: "lxd-ui-e2e-tests@example.org"
      LXD_OIDC_PASSWORD: "lxd-ui-e2e-password"
      LXD_OIDC_GROUPS_CLAIM: "lxd-idp-groups"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Dotrun
        run: |
          sudo pip3 install dotrun

      - name: Install LXD-UI dependencies
        run: |
          sudo chmod 0777 ../lxd-ui
          dotrun install

      - name: Generate SSL keys for HAProxy
        run: |
          mkdir -p keys
          openssl req -x509 -newkey rsa:4096 -keyout keys/lxd-ui.key -out keys/lxd-ui.crt -days 365 -nodes -subj "/CN=localhost"
          cat keys/lxd-ui.key keys/lxd-ui.crt > keys/lxd-ui.pem

      - name: OVN dependencies
        run: |
          sudo snap refresh snapd --channel latest/beta || sudo snap install snapd --channel latest/beta
          sudo snap refresh core26 --channel latest/edge || sudo snap install core26 --channel latest/edge

      - name: Setup Ceph
        if: ${{ matrix.lxd_channel != '5.0/edge' }}
        uses: canonical/lxd/.github/actions/setup-microceph@83beb32729de0814ac0e7e6b1223a7d009cde268

      - name: Setup OVN
        if: ${{ matrix.lxd_channel != '5.0/edge' }}
        uses: canonical/lxd/.github/actions/setup-microovn@83beb32729de0814ac0e7e6b1223a7d009cde268

      - name: Install LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1
        with:
          channel: ${{ matrix.lxd_channel }}

      - name: Setup LXD (Clustered in VMs)
        if: ${{ matrix.deployment == 'clustered' }}
        shell: bash
        run: |
          set -x
          sudo lxd init --auto
          sudo lxc launch ubuntu:24.04 vm1 --vm
          until sudo lxc exec vm1 -- true 2>/dev/null; do
            sleep 1
          done
          sudo lxc exec vm1 -- cloud-init status --wait
          sudo lxc launch ubuntu:24.04 vm2 --vm
          until sudo lxc exec vm2 -- true 2>/dev/null; do
            sleep 1
          done
          sudo lxc exec vm2 -- cloud-init status --wait

          sudo lxc exec vm1 -- snap install lxd --channel=${{ matrix.lxd_channel }}
          sudo lxc exec vm2 -- snap install lxd --channel=${{ matrix.lxd_channel }}

          VM1_IP=$(sudo lxc list vm1 --format csv -c 4 | cut -d' ' -f1 | cut -d',' -f1)
          VM2_IP=$(sudo lxc list vm2 --format csv -c 4 | cut -d' ' -f1 | cut -d',' -f1)

          # Bootstrap VM1
          cat <<EOF | sudo lxc exec vm1 -- lxd init --preseed
          config:
            core.https_address: ${VM1_IP}:8443
          cluster:
            enabled: true
            server_name: vm1
          networks:
          - name: lxdbr0
            type: bridge
            config:
              ipv4.address: auto
              ipv6.address: auto
          storage_pools:
          - name: default
            driver: dir
            config: {}
          profiles:
          - name: default
            devices:
              root:
                path: /
                pool: default
                type: disk
          EOF

          TOKEN=$(sudo lxc exec vm1 -- lxc cluster add vm2 | grep -oE 'ey[A-Za-z0-9._=-]+')

          # Join VM2
          cat <<EOF | sudo lxc exec vm2 -- lxd init --preseed
          cluster:
            enabled: true
            server_name: vm2
            server_address: ${VM2_IP}:8443
            cluster_token: ${TOKEN}
          EOF

          cat keys/lxd-ui.crt | sudo lxc exec vm1 -- lxc config trust add - || true

          echo "LXD_UI_BACKEND_IP=$VM1_IP" > .env.local

          sudo lxc exec vm1 -- sudo snap install snapd --channel=latest/beta
          sudo lxc exec vm1 -- sudo snap install core26 --channel latest/edge
          sudo lxc exec vm1 -- sudo snap install microovn --channel latest/edge
          sudo lxc exec vm1 -- sudo microovn waitready
          sudo lxc exec vm1 -- sudo microovn cluster bootstrap
          sudo lxc exec vm1 -- sudo microovn status
          OVN_TOKEN=$(sudo lxc exec vm1 -- sudo microovn cluster add vm2)

          sudo lxc exec vm2 -- sudo snap install snapd --channel=latest/beta
          sudo lxc exec vm2 -- sudo snap install core26 --channel latest/edge
          sudo lxc exec vm2 -- sudo snap install microovn --channel latest/edge
          sudo lxc exec vm2 -- sudo microovn waitready
          sudo lxc exec vm2 -- sudo microovn cluster join "$OVN_TOKEN"
          sudo lxc exec vm2 -- sudo microovn status

          sudo lxc exec vm1 -- lxc config set network.ovn.northbound_connection "ssl:$VM1_IP:6641,ssl:$VM2_IP:6641"

          # Wait for OVN chassis to be fully registered
          echo "Waiting for OVN chassis registration..."
          sleep 15

          # Verify chassis are registered
          echo "Checking chassis status..."
          sudo lxc exec vm1 -- sudo ovn-sbctl show

          # Wait for ovn-controller to be ready on both nodes
          for vm in vm1 vm2; do
            echo "Checking ovn-controller on $vm..."
            sudo lxc exec $vm -- sudo systemctl is-active ovn-controller || true
            sudo lxc exec $vm -- sudo ovn-sbctl list chassis || true
          done

      - name: Setup LXD (Unclustered on host)
        if: ${{ matrix.deployment == 'unclustered' }}
        shell: bash
        run: |
          set -x
          sudo lxc config set core.https_address "[::]:8443"
          sudo lxc config trust add keys/lxd-ui.crt

      - name: Setup LXD (Single-node cluster)
        if: ${{ matrix.deployment == 'single-node-cluster' }}
        shell: bash
        run: |
          set -x
          HOST_IP=$(ip route get 8.8.8.8 | awk '{print $7; exit}')
          sudo lxc config trust add keys/lxd-ui.crt
          cat <<EOF | sudo lxd init --preseed
          config:
            core.https_address: ${HOST_IP}:8443
          networks:
          - name: lxdbr0
            type: bridge
            config:
              ipv4.address: auto
              ipv6.address: auto
          storage_pools:
          - name: default
            driver: dir
            config: {}
          profiles:
          - name: default
            devices:
              root:
                path: /
                pool: default
                type: disk
          EOF
          echo "LXD_UI_BACKEND_IP=${HOST_IP}" > .env.local

      - name: Setup for tests
        if: ${{ matrix.lxd_channel != '5.0/edge' }}
        shell: bash
        env:
          DEPLOYMENT: ${{ matrix.deployment }}
          LXD_OIDC_ISSUER: ${{ env.LXD_OIDC_ISSUER }}
          LXD_OIDC_CLIENT_ID: ${{ env.LXD_OIDC_CLIENT_ID }}
          LXD_OIDC_CLIENT_SECRET: ${{ env.LXD_OIDC_CLIENT_SECRET }}
          LXD_OIDC_AUDIENCE: ${{ env.LXD_OIDC_AUDIENCE }}
          LXD_OIDC_GROUPS_CLAIM: ${{ env.LXD_OIDC_GROUPS_CLAIM }}
        run: sudo -E ./tests/scripts/setup_test

      - name: Run LXD-UI
        env:
          ENVIRONMENT: devel
          PORT: 8407
          VITE_PORT: 3000
        run: |
          echo "Backend configuration:"
          if [ -f .env.local ]; then
            cat .env.local
          else
            echo "Using default backend configuration"
          fi
          dotrun &
          sleep 10
          curl --head --fail --retry-delay 2 --retry 100 --retry-connrefused --insecure https://localhost:8407

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        env:
          BROWSER: ${{ matrix.browser }}
          DEPLOYMENT: ${{ matrix.deployment }}
          LXD_CHANNEL: ${{ matrix.lxd_channel }}
        run: |
          PLAYWRIGHT_CHANNEL=$(echo "${LXD_CHANNEL}" | sed 's#/#-#g')
          npx playwright test --project "${BROWSER}:lxd-${PLAYWRIGHT_CHANNEL}:${DEPLOYMENT}"

      - name: Rename Playwright report and artifacts folder
        if: always()
        env:
          BROWSER: ${{ matrix.browser }}
          DEPLOYMENT: ${{ matrix.deployment }}
          LXD_CHANNEL: ${{ steps.lxd-env.outputs.LXD_CHANNEL }}
        run: |
          mv blob-report/report.zip "blob-report/${BROWSER}-lxd-${LXD_CHANNEL}-${DEPLOYMENT}.zip"
          mv test-results "test-artifacts-${BROWSER}-lxd-${LXD_CHANNEL}-${DEPLOYMENT}"

      - name: Upload ${{ matrix.browser }}-lxd-${{ steps.lxd-env.outputs.LXD_CHANNEL }}-${{ matrix.deployment }} artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-artifacts-${{ matrix.browser }}-lxd-${{ steps.lxd-env.outputs.LXD_CHANNEL }}-${{ matrix.deployment }}
          path: test-artifacts-${{ matrix.browser }}-lxd-${{ steps.lxd-env.outputs.LXD_CHANNEL }}-${{ matrix.deployment }}
          retention-days: 7

      - name: Upload ${{ matrix.browser }}-lxd-${{ steps.lxd-env.outputs.LXD_CHANNEL }}-${{ matrix.deployment }} blob reports to be merged
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-blob-report-${{ matrix.browser }}-lxd-${{ steps.lxd-env.outputs.LXD_CHANNEL }}-${{ matrix.deployment }}
          path: blob-report
          retention-days: 1

  merge-e2e-reports:
    if: always()
    needs: [browser-e2e-test]
    env:
      HTML_REPORT_URL_PATH: reports/pr-${{ github.event.number }}/${{ github.run_id }}/${{ github.run_attempt }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: test-blob-reports
          pattern: test-blob-report-*
          merge-multiple: true

      # NOTE: there is no need to install playwright dependencies since we only need to merge reports here
      - name: Merge into HTML Report
        run: npx playwright merge-reports --config=merge.playwright.config.ts ./test-blob-reports

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  js-tests:
    name: js-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Dotrun
        run: |
          sudo pip3 install dotrun

      - name: Install LXD-UI dependencies
        run: |
          set -x
          sudo chmod 0777 ../lxd-ui
          dotrun install

      - name: Run Javascript tests
        run: dotrun test-js

name: Screenshot automation
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays at midnight

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-e2e-test:
    name: generate-screenshots
    runs-on: ubuntu-latest
    outputs:
      job_status: ${{job.status}}
    env:
      LXD_OIDC_CLIENT_ID: "RYDnMpkygLAMfeo17lU7LYwWGxisRuRR"
      LXD_OIDC_CLIENT_SECRET: "CNKX4UmrZKZJq5rJy5VM_JfcNPqkws1rwWWQk_q0oyZ8gABARr19ic7xrhPssGA1"
      LXD_OIDC_ISSUER: "https://dev-h6c02msuggpi6ijh.eu.auth0.com/"
      LXD_OIDC_AUDIENCE: "https://dev-h6c02msuggpi6ijh.eu.auth0.com/api/v2/"
      LXD_OIDC_USER: "lxd-ui-e2e-tests@example.org"
      LXD_OIDC_PASSWORD: "lxd-ui-e2e-password"
      LXD_OIDC_GROUPS_CLAIM: "lxd-idp-groups"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Dotrun
        run: |
          sudo pip3 install dotrun

      - name: Install LXD-UI dependencies
        run: |
          set -x
          sudo chmod 0777 ../lxd-ui
          dotrun install

      - name: OVN dependencies
        run: |
          sudo snap refresh snapd --channel latest/beta || sudo snap install snapd --channel latest/beta
          sudo snap refresh core26 --channel latest/edge || sudo snap install core26 --channel latest/edge

      - name: Run LXD-UI
        env:
          ENVIRONMENT: devel
          PORT: 8407
          LXD_UI_BACKEND_IP: 172.17.0.1
          VITE_PORT: 3000
        run: |
          dotrun &
          curl --head --fail --retry-delay 2 --retry 100 --retry-connrefused --insecure https://localhost:8407

      - name: Setup Ceph
        uses: canonical/lxd/.github/actions/setup-microceph@d92c1f534fca3bbe0949b46ea49c3dc92f6f46e8

      - name: Setup OVN
        uses: canonical/lxd/.github/actions/setup-microovn@d92c1f534fca3bbe0949b46ea49c3dc92f6f46e8

      - name: Install LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1
        with:
          group: lxd
          channel: "latest/edge"

      - name: Setup LXD
        shell: bash
        run: |
          set -x
          sudo lxc config set core.https_address "[::]:8443"
          sudo lxc config trust add keys/lxd-ui.crt
          sudo lxc config set cluster.https_address "127.0.0.1"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Setup for tests
        shell: bash
        run: sudo -E ./tests/scripts/setup_test

      - name: Run Playwright tests
        env:
          ENABLE_SCREENSHOTS: true
        run: |
          npx playwright test --project screenshots
          npx playwright test --project screenshots-clustered
      
      - name: List screenshots
        run: ls -R tests/screenshots || echo "No screenshots found"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: lxd-ui-doc-screenshots
          path: tests/screenshots/doc/images
          retention-days: 7

      - name: Upload screenshot-automation-report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: report
          path: blob-report
          retention-days: 1

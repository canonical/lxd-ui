global
  daemon

defaults
  mode  http
  timeout connect 50000
  timeout client  500000
  timeout server  500000

frontend lxd_frontend
  bind 0.0.0.0:8407 ssl verify optional crt keys/lxd-ui.pem ca-file keys/lxd-ui.crt

  acl needs_trailing_slash path_reg ^.*/ui$
  http-request redirect code 301 location %[path]/ if needs_trailing_slash

  acl is_root path /
  acl is_not_app path_beg /1.0 /oidc /documentation
  acl is_not_ui   path_reg ^.*/ui/.*
  http-request redirect code 301 location /ui/ if is_root
  http-request redirect code 301 location %[path]/ui/ if !is_root !is_not_app !is_not_ui !needs_trailing_slash

  acl is_core path_beg /1.0
  acl is_oidc path_beg /oidc
  acl is_docs path_beg /documentation
  use_backend lxd_core if is_core || is_oidc || is_docs
  default_backend lxd_ui

backend lxd_ui
  server yarn_serve_port 127.0.0.1:VITE_PORT

backend lxd_core
  server lxd_https LXD_UI_BACKEND_IP:8443 ssl verify none crt keys/lxd-ui.pem
